<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Bahasa Inggris Kelas 3 - STS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #F7F9F9;
            --correct: #2ECC71;
            --incorrect: #E74C3C;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none; /* Anti copy paste */
        }

        /* Header */
        #quiz-header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Main Container */
        .container {
            flex: 1;
            max-width: 800px;
            margin: 30px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            width: 90%;
        }

        /* Login Screen */
        .login-screen {
            text-align: center;
        }

        .login-screen h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px var(--accent);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--secondary);
            outline: none;
        }

        .btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-home {
            background-color: var(--primary);
            display: inline-block;
            text-decoration: none;
            margin-bottom: 30px;
        }

        .btn-nav {
            background-color: var(--dark);
        }

        /* History Table */
        .history-container {
            margin-top: 40px;
            text-align: left;
        }

        .history-container h3 {
            color: var(--dark);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: var(--light);
            font-weight: 600;
        }

        /* Quiz Area */
        .quiz-area {
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 600;
            background: var(--light);
            padding: 10px 20px;
            border-radius: 10px;
            border-left: 5px solid var(--secondary);
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        /* Mini Dictionary Styling */
        .mini-dictionary {
            background-color: #fff9e6;
            border: 2px dashed #f1c40f;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .dict-title {
            font-weight: bold;
            color: #d35400;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1rem;
        }

        .dict-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 20px;
            font-size: 0.9rem;
        }

        .dict-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 3px;
        }

        .dict-en {
            font-weight: 600;
            color: #2980b9;
        }

        .dict-id {
            color: #2c3e50;
            font-style: italic;
        }

        @media (max-width: 500px) {
            .dict-grid {
                grid-template-columns: 1fr;
            }
        }

        .question-image-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .question-image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 3px solid var(--accent);
        }
        
        .image-caption {
            font-style: italic;
            font-size: 0.9rem;
            color: #555;
            margin-top: 5px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid #ddd;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary);
            background-color: #f0fbfb;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: var(--correct);
            color: white;
            border-color: var(--correct);
        }

        .option-btn.wrong {
            background-color: var(--incorrect);
            color: white;
            border-color: var(--incorrect);
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid var(--secondary);
            border-radius: 5px;
            display: none;
        }

        .navigation-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }

        /* Result Area */
        .result-area {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: 800;
            margin: 0 auto 20px auto;
            box-shadow: 0 10px 20px rgba(78, 205, 196, 0.4);
        }

        /* Footer */
        footer {
            background-color: #1a1a1a;
            color: #ccc;
            text-align: center;
            padding: 15px;
            width: 100%;
            font-size: 0.85rem;
            margin-top: auto;
            box-sizing: border-box;
        }

        footer a {
            color: #4da6ff;
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="quiz-header">Kode Soal: ENG-STS-K3-S2-HOTS</div>

    <div class="container">
        <div id="login-screen" class="login-screen">
            <h1>English Quiz</h1>
            <p>Sumatif Tengah Semester - Kelas 3</p>
            
            <div class="input-group">
                <label for="student-name">Nama Lengkap:</label>

            </div>
            
            <div class="input-group">
                <label for="student-class">Kelas:</label>

            <div class="history-container">

                    <thead>

        </div>

        <div id="quiz-area" class="quiz-area">

            <div id="image-container" class="question-image-container" style="display: none;">

                <div id="image-caption" class="image-caption"></div>
            </div>

            <div id="question-text" class="question-text">Teks soal akan muncul di sini.</div>
            
            <!-- Tempat Kamus Kecil -->
            <div id="mini-dictionary" class="mini-dictionary"></div>

            <div id="options-container" class="options"></div>

            <div id="explanation-box" class="explanation">
                <strong>Pembahasan:</strong> <span id="explanation-text"></span>
            </div>

            <div class="navigation-buttons">
                <button class="btn btn-nav" id="btn-prev" onclick="prevQuestion()" style="visibility: hidden;">Sebelumnya</button>
                <button class="btn btn-nav" id="btn-next" onclick="nextQuestion()" style="display: none;">Selanjutnya</button>
            </div>
        </div>

        <div id="result-area" class="result-area">
            <h1>Kuis Selesai!</h1>
            <div class="score-circle" id="final-score">100</div>
            <p id="result-message"></p>
            <button class="btn" onclick="location.reload()">Selesai & Kembali</button>
        </div>
    </div>

        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = []; 
        let studentData = { name: "", class: "" };

        const HISTORY_KEY = "History_ENG_STS_K3_S2_HOTS";

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            if(history.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada riwayat pengerjaan.</td></tr>';
                return;
            }

            history.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.class}</td>
                        <td><strong>${item.score}</strong></td>
                        <td>${item.time}</td>
                    </tr>
                `;
            });
        }
        loadHistory();

        function startQuiz() {
            const name = document.getElementById('student-name').value;
            const cls = document.getElementById('student-class').value;

            if (!name || !cls) {
                alert("Harap isi nama dan kelas terlebih dahulu!");
                return;
            }

            studentData = { name, class: cls };
            
            quizQuestions = JSON.parse(JSON.stringify(allQuestions)); 
            shuffleArray(quizQuestions);
            
            quizQuestions.forEach(q => {
                shuffleArray(q.options);
            });

            currentQuestionIndex = 0;
            score = 0;
            userAnswers = new Array(quizQuestions.length).fill(null);

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            
            loadQuestion();
            updateScoreDisplay();
        }

        function loadQuestion() {
            const q = quizQuestions[currentQuestionIndex];
            
            document.getElementById('question-counter').textContent = `Soal: ${currentQuestionIndex + 1} / ${quizQuestions.length}`;
            document.getElementById('question-text').textContent = q.question;

            const imgContainer = document.getElementById('image-container');
            if (q.type === "image") {
                imgContainer.style.display = 'block';
                document.getElementById('question-image').src = q.image;
                document.getElementById('image-caption').textContent = q.caption;
            } else {
                imgContainer.style.display = 'none';
            }

            // Tampilkan Kamus Kecil (Mini Dictionary)
            const dictContainer = document.getElementById('mini-dictionary');
            if (q.dictionary && q.dictionary.length > 0) {
                let dictHTML = '<div class="dict-title">📖 Kamus Kecil (Mini Dictionary)</div><div class="dict-grid">';
                q.dictionary.forEach(word => {
                    dictHTML += `<div class="dict-item"><span class="dict-en">${word.en}</span> <span class="dict-id">${word.id}</span></div>`;
                });
                dictHTML += '</div>';
                dictContainer.innerHTML = dictHTML;
                dictContainer.style.display = 'block';
            } else {
                dictContainer.style.display = 'none';
            }

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('btn-prev').style.visibility = currentQuestionIndex > 0 ? 'visible' : 'hidden';
            document.getElementById('btn-next').style.display = 'none'; 

            if (userAnswers[currentQuestionIndex] !== null) {
                disableOptionsAndShowExplanation(userAnswers[currentQuestionIndex].selected);
                document.getElementById('btn-next').style.display = 'block';
            }
        }

        function selectAnswer(selectedOpt, btnElement) {
            if (userAnswers[currentQuestionIndex] !== null) {
                return;
            }

            const q = quizQuestions[currentQuestionIndex];
            const isCorrect = selectedOpt === q.correctAnswer;
            
            userAnswers[currentQuestionIndex] = {
                selected: selectedOpt,
                isCorrect: isCorrect
            };

            updateScoreDisplay();
            disableOptionsAndShowExplanation(selectedOpt);
            
            document.getElementById('btn-next').style.display = 'block';
            if(currentQuestionIndex === quizQuestions.length - 1) {
                document.getElementById('btn-next').textContent = "Selesai";
            }
        }

        function disableOptionsAndShowExplanation(selectedOpt) {
            const q = quizQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => {
                btn.disabled = true;
                const optText = btn.textContent.substring(3); 

                if (optText === q.correctAnswer) {
                    btn.classList.add('correct');
                } else if (optText === selectedOpt && selectedOpt !== q.correctAnswer) {
                    btn.classList.add('wrong');
                }
            });

            const expBox = document.getElementById('explanation-box');
            document.getElementById('explanation-text').textContent = q.explanation;
            expBox.style.display = 'block';
        }

        function updateScoreDisplay() {
            const correctAnswersCount = userAnswers.filter(answer => answer !== null && answer.isCorrect).length;
            let calculatedScore = (correctAnswersCount / quizQuestions.length) * 100;
            score = Math.min(Math.round(calculatedScore), 100);
            document.getElementById('live-score').textContent = `Skor: ${score}`;
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizQuestions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            
            const finalScore = Math.round(score);
            document.getElementById('final-score').textContent = finalScore;
            
            let message = "";
            if(finalScore >= 80) message = "Luar biasa! Pertahankan prestasimu.";
            else if(finalScore >= 60) message = "Bagus! Terus berlatih ya.";
            else message = "Jangan menyerah, ayo belajar lebih giat lagi!";
            document.getElementById('result-message').textContent = message;

            saveHistory(finalScore);
        }

        function saveHistory(finalScore) {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            
            const now = new Date();
            const timeString = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

            history.unshift({
                name: studentData.name,
                class: studentData.class,
                score: finalScore,
                time: timeString
            });

            if(history.length > 50) history.pop();

            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            loadHistory(); 

            // Simpan ke riwayat global untuk rekap.html
            const dataKuisGlobal = JSON.parse(localStorage.getItem('dataKuis')) || [];
            
            dataKuisGlobal.push({
                nama: studentData.name,
                kelas: studentData.class,
                mapel: "Bahasa Inggris Kelas 3 - STS", 
                nilai: finalScore,
                waktu: timeString
            });
            
            localStorage.setItem('dataKuis', JSON.stringify(dataKuisGlobal));
        }
    </script>
