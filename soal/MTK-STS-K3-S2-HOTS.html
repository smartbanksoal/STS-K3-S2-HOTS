            {
                q: "Ibu guru menggambar sebuah kurva tertutup lurus yang dibatasi oleh empat ruas garis, dengan semua sudutnya siku-siku dan semua sisinya sama panjang. Bangun apa yang digambar guru?",
                opts: ["Guru menggambar persegi panjang", "Guru menggambar bangun persegi", "Guru menggambar sebuah belah ketupat", "Guru menggambar layang-layang"],
                ans: "Guru menggambar bangun persegi",
                bahas: "Bangun datar dengan 4 sisi sama panjang dan 4 sudut siku-siku adalah sifat pasti dari bangun persegi."
            }
        ];

        // Variabel Status Kuis
        let currentSoalIndex = 0;
        let score = 0;
        let questionOrder = [];
        let startTime = "";
        let studentData = { nama: "", kelas: "" };
        let answeredQuestions = []; 

        // Fungsi Load History
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            history.forEach(entry => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${entry.nama}</td><td>${entry.kelas}</td><td>${entry.waktu}</td><td>${entry.skor}</td>`;
                tbody.appendChild(tr);
            });
        }

        // Fungsi Acak Array (Fisher-Yates)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function startQuiz() {
            const nama = document.getElementById('student-name').value;
            const kelas = document.getElementById('student-class').value;
            if (!nama || !kelas) {
                alert("Silakan isi nama dan kelas terlebih dahulu!");
                return;
            }

            studentData.nama = nama;
            studentData.kelas = kelas;
            startTime = new Date().toLocaleString('id-ID');
            
            // 3. RESET VARIABEL SECARA MENYELURUH
            currentSoalIndex = 0;
            score = 0;
            questionOrder = Array.from({length: soalDatabase.length}, (_, i) => i);
            shuffleArray(questionOrder);
            
            // Persiapkan array memori dengan nilai null
            answeredQuestions = new Array(soalDatabase.length).fill(null);

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            updateScoreDisplay(); // Render skor awal 0
            loadQuestion();
        }

        function loadQuestion() {
            const indexSoalAsli = questionOrder[currentSoalIndex];
            const qData = soalDatabase[indexSoalAsli];
            
            document.getElementById('question-number').textContent = `Soal ${currentSoalIndex + 1} / ${soalDatabase.length}`;
            document.getElementById('question-text').textContent = qData.q;
            
            // Atur Gambar jika ada
            const imgEl = document.getElementById('question-img');
            if (qData.img) {
                imgEl.src = qData.img;
                imgEl.alt = qData.imgAlt;
                imgEl.classList.remove('hidden');
            } else {
                imgEl.classList.add('hidden');
                imgEl.src = "";
            }

            // Acak pilihan jawaban
            let opts = [...qData.opts];
            shuffleArray(opts);

            const optContainer = document.getElementById('options-container');
            optContainer.innerHTML = '';
            
            // Sembunyikan pembahasan & tombol next
            const bahasContainer = document.getElementById('pembahasan-container');
            bahasContainer.classList.add('hidden');
            bahasContainer.innerHTML = '';
            document.getElementById('btn-next').classList.add('hidden');

            // Cek status Flagging (apakah sudah dijawab di memori)
            const hasAnswered = answeredQuestions[currentSoalIndex] !== null;

            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-option';
                btn.textContent = opt;
                
                // Jika sudah dijawab, tampilkan mode Read-Only
                if (hasAnswered) {
                    btn.disabled = true;
                    if (opt === qData.ans) btn.classList.add('correct');
                    if (answeredQuestions[currentSoalIndex].selected === opt && opt !== qData.ans) {
                        btn.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => selectAnswer(btn, opt, qData);
                }
                optContainer.appendChild(btn);
            });

            if (hasAnswered) {
                tampilkanPembahasan(qData);
                document.getElementById('btn-next').classList.remove('hidden');
            }

            // Tombol Previous
            document.getElementById('btn-prev').disabled = currentSoalIndex === 0;
            
            // Update teks tombol next
            if (currentSoalIndex === soalDatabase.length - 1) {
                document.getElementById('btn-next').textContent = "Selesai & Lihat Hasil";
            } else {
                document.getElementById('btn-next').textContent = "Soal Selanjutnya";
            }
        }

        function selectAnswer(selectedBtn, selectedText, qData) {
            // 1. SISTEM FLAGGING: Tolak interaksi jika soal ini sudah tercatat dijawab
            if (answeredQuestions[currentSoalIndex] !== null) return;

            const isCorrect = (selectedText === qData.ans);

            // Simpan jejak jawaban dalam bentuk objek
            answeredQuestions[currentSoalIndex] = {
                selected: selectedText,
                isCorrect: isCorrect
            };

            // Kunci semua tombol secara visual
            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === qData.ans) {
                    btn.classList.add('correct');
                }
            });

            // Tandai jawaban yang salah secara visual
            if (!isCorrect) {
                selectedBtn.classList.add('wrong');
            }

            // Hitung ulang seluruh skor dengan metode aman
            updateScoreDisplay();

            // Tampilkan pembahasan
            tampilkanPembahasan(qData);
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function updateScoreDisplay() {
            // 4. PERHITUNGAN BERBASIS PERSENTASE
            const correctCount = answeredQuestions.filter(ans => ans !== null && ans.isCorrect).length;
            let calculatedScore = (correctCount / soalDatabase.length) * 100;

            // 2. PENGGUNAAN LIMITER
            score = Math.min(Math.round(calculatedScore), 100);

            document.getElementById('current-score').textContent = score;
        }

        function tampilkanPembahasan(qData) {
            const bahasContainer = document.getElementById('pembahasan-container');
            bahasContainer.innerHTML = `<strong>Pembahasan:</strong><br>${qData.bahas}`;
            bahasContainer.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentSoalIndex < soalDatabase.length - 1) {
                currentSoalIndex++;
                loadQuestion();
            } else {
                finishQuiz();
            }
        }

        function prevQuestion() {
            if (currentSoalIndex > 0) {
                currentSoalIndex--;
                loadQuestion();
            }
        }

        function finishQuiz() {
            const finalScore = Math.round(score);
            
            // Simpan ke localstorage
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            history.push({
                nama: studentData.nama,
                kelas: studentData.kelas,
                waktu: startTime,
                skor: finalScore
            });
            // Batasi 50 riwayat terakhir
            if(history.length > 50) history.shift();
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

            // Tampilkan layar hasil
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('res-name').textContent = studentData.nama;
            document.getElementById('res-class').textContent = studentData.kelas;
            document.getElementById('final-score').textContent = finalScore;
        }

        // Panggil saat pertama kali load
        window.onload = loadHistory;
    </script>
</body>
</html>
