        // FUNGSI PENGACAK ARRAY (Fisher-Yates)
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];

            return arr;
        }

        // INIT LOAD HISTORY
        window.onload = function() {
            tampilkanHistory();
        }

        // MULAI KUIS
        function mulaiKuis() {
            const elNama = document.getElementById('namaLengkap').value.trim();
            const elKelas = document.getElementById('kelasSiswa').value.trim();

            if (!elNama || !elKelas) {
                alert("Harap isi Nama Lengkap dan Kelas terlebih dahulu!");
                return;
            }

            namaUser = elNama;
            kelasUser = elKelas;
            waktuMulai = new Date();

            // 3. RESET VARIABEL SECARA MENYELURUH (Deep Copy)
            soalTeracak = JSON.parse(JSON.stringify(bankSoal)); 
            soalTeracak = shuffleArray(soalTeracak);
            
            // Acak opsi jawaban tepat satu kali saat kuis dimulai
            soalTeracak.forEach(soal => {
                soal.options = shuffleArray(soal.options);
            });

            indexSoal = 0;
            skor = 0;
            jawabanUser = new Array(soalTeracak.length).fill(null);

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';

            updateSkorDisplay();
            tampilkanSoal();
        }

        // TAMPILKAN SOAL
        function tampilkanSoal() {
            const dataSoal = soalTeracak[indexSoal];
            
            // Render Teks Soal
            document.getElementById('soalText').innerText = `Soal ${indexSoal + 1} dari ${soalTeracak.length}: ${dataSoal.question}`;

            // Render Gambar jika ada
            const imgEl = document.getElementById('soalGambar');
            const capEl = document.getElementById('gambarCaption');
            if (dataSoal.image) {
                imgEl.src = dataSoal.image;
                imgEl.style.display = 'block';
                capEl.innerText = dataSoal.imageCaption || '';
                capEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
                capEl.style.display = 'none';
            }

            // Render Opsi
            const opsiListEl = document.getElementById('opsiList');
            opsiListEl.innerHTML = '';
            
            dataSoal.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opsi-btn';
                btn.innerText = opt;
                
                // SISTEM FLAGGING & READ-ONLY
                if (jawabanUser[indexSoal] !== null) {
                    btn.disabled = true;
                    if (opt === dataSoal.answer) {
                        btn.classList.add('benar');
                    } else if (opt === jawabanUser[indexSoal].jawab && !jawabanUser[indexSoal].isBenar) {
                        btn.classList.add('salah');
                    }
                } else {
                    btn.onclick = () => pilihJawaban(btn, opt, dataSoal.answer, dataSoal.explanation);
                }
                
                opsiListEl.appendChild(btn);
            });

            // Pembahasan
            const pembahasanBox = document.getElementById('pembahasanBox');
            if (jawabanUser[indexSoal] !== null) {
                pembahasanBox.innerText = dataSoal.explanation;
                pembahasanBox.style.display = 'block';
            } else {
                pembahasanBox.style.display = 'none';
            }

            // Navigasi
            document.getElementById('btnPrev').disabled = (indexSoal === 0);
            
            const btnNext = document.getElementById('btnNext');
            if (indexSoal === soalTeracak.length - 1) {
                btnNext.innerText = "Selesai & Simpan";
                btnNext.classList.replace('btn-nav', 'btn-mulai'); // Warna hijau
            } else {
                btnNext.innerText = "Selanjutnya";
                btnNext.classList.replace('btn-mulai', 'btn-nav');
            }
        }

        // PILIH JAWABAN
        function pilihJawaban(btnEl, jawabanDipilih, jawabanBenar, pembahasan) {
            // 1. SISTEM FLAGGING: Tolak klik jika soal ini sudah tercatat dijawab
            if (jawabanUser[indexSoal] !== null) return;

            const isBenar = (jawabanDipilih === jawabanBenar);

            // Simpan jejak jawaban ke dalam memori objek
            jawabanUser[indexSoal] = {
                jawab: jawabanDipilih,
                isBenar: isBenar
            };

            // Hitung ulang dan update tampilan skor
            updateSkorDisplay();

            // Kunci interaksi tombol
            const semuaBtn = document.querySelectorAll('.opsi-btn');
            semuaBtn.forEach(b => {
                b.disabled = true;
                if (b.innerText === jawabanBenar) {
                    b.classList.add('benar');
                } else if (b.innerText === jawabanDipilih && !isBenar) {
                    b.classList.add('salah');
                }
            });

            // Tampilkan pembahasan
            const pembahasanBox = document.getElementById('pembahasanBox');
            pembahasanBox.innerText = pembahasan;
            pembahasanBox.style.display = 'block';
        }

        // FUNGSI UPDATE SKOR BARU
        function updateSkorDisplay() {
            // 4. PERHITUNGAN BERBASIS PERSENTASE
            const jumlahBenar = jawabanUser.filter(j => j !== null && j.isBenar).length;
            const skorHitung = (jumlahBenar / soalTeracak.length) * 100;
            
            // 2. LIMITER: Kunci maksimal di 100
            skor = Math.min(Math.round(skorHitung), 100);
            
            document.getElementById('skorDisplay').innerText = `Skor Sementara: ${skor}`;
        }

        // NAVIGASI
        function soalSebelumnya() {
            if (indexSoal > 0) {
                indexSoal--;
                tampilkanSoal();
            }
        }

        function soalSelanjutnya() {
            if (jawabanUser[indexSoal] === null) {
                alert("Silakan pilih jawaban terlebih dahulu!");
                return;
            }

            if (indexSoal < soalTeracak.length - 1) {
                indexSoal++;
                tampilkanSoal();
            } else {
                selesaikanKuis();
            }
        }

        // SELESAI
        function selesaikanKuis() {
            const waktuSelesai = new Date();
            const stringWaktu = `${waktuSelesai.getDate()}/${waktuSelesai.getMonth()+1}/${waktuSelesai.getFullYear()} ${waktuSelesai.getHours()}:${String(waktuSelesai.getMinutes()).padStart(2, '0')}`;

            const riwayatBaru = {
                nama: namaUser,
                kelas: kelasUser,
                skor: skor,
                waktu: stringWaktu
            };

            let dataHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            dataHistory.push(riwayatBaru);
            
            // Limitasi array memori browser (misal 50 terbaru)
            if (dataHistory.length > 50) dataHistory.shift();
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataHistory));

            alert(`Selamat ${namaUser}! Kuis selesai.\nSkor Akhir Anda: ${skor}`);
            
            window.location.reload();
        }

        // TAMPILKAN HISTORY
        function tampilkanHistory() {
            const dataHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            if (dataHistory.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Belum ada riwayat skor.</td></tr>';
                return;
            }

            // Menampilkan riwayat terbaru di atas
            dataHistory.slice().reverse().forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.nama}</td>
                    <td>${row.kelas}</td>
                    <td><strong style="color: #2ed573;">${row.skor}</strong></td>
                    <td>${row.waktu}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
