        // Variabel Status Kuis
        let currentUser = {};
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let score = 0;

        // Fungsi Acak Array (Fisher-Yates)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        // Tampilkan Riwayat saat halaman dimuat
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            history.forEach(entry => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${entry.nama}</td><td>${entry.kelas}</td><td>${entry.waktu}</td><td>${entry.skor}</td>`;
                tbody.appendChild(tr);
            });
        }
        window.onload = loadHistory;

        function startQuiz() {
            const nama = document.getElementById('nama').value.trim();
            const kelas = document.getElementById('kelas').value.trim();
            if(!nama || !kelas) {
                alert("Silakan isi nama dan kelas terlebih dahulu!");
                return;
            }

            currentUser = { nama, kelas };
            
            // Siapkan Soal
            currentQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(currentQuestions);
            
            // Acak pilihan jawaban di dalam setiap soal
            currentQuestions.forEach(q => {
                let optsWithAns = q.opts.map(opt => ({ text: opt, isCorrect: opt === q.ans }));
                shuffleArray(optsWithAns);
                q.shuffledOpts = optsWithAns;
            });

            // 3. RESET VARIABEL SECARA MENYELURUH
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            updateScoreDisplay(); // Reset papan skor ke 0
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            
            // Header Kode Soal
            document.getElementById('main-header').textContent = `Kode Soal: PNC-STS-K3-S2-HOTS | Soal ${currentQuestionIndex + 1} dari ${currentQuestions.length}`;
            
            // Update Teks & Gambar
            document.getElementById('q-text').textContent = q.q;
            const imgEl = document.getElementById('q-img');
            if(q.img && q.img !== "") {
                imgEl.src = q.img;
                imgEl.alt = q.imgAlt;
                imgEl.classList.remove('hidden');
            } else {
                imgEl.classList.add('hidden');
            }

            // Update Pilihan Jawaban
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            // Cek status flagging dari array memori
            const statusJawaban = userAnswers[currentQuestionIndex];
            const isAnswered = statusJawaban !== null;

            q.shuffledOpts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                // Memberikan label A, B, C, D
                const labels = ['A', 'B', 'C', 'D'];
                btn.textContent = `${labels[index]}. ${opt.text}`;
                
                // Menerapkan Read-Only Mode jika sudah dijawab
                if (isAnswered) {
                    btn.classList.add('disabled');
                    if (opt.isCorrect) {
                        btn.classList.add('correct');
                    } else if (statusJawaban.text === opt.text && !opt.isCorrect) {
                        btn.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => selectAnswer(opt, btn);
                }
                optionsDiv.appendChild(btn);
            });

            // Atur Pembahasan & Navigasi
            const expDiv = document.getElementById('explanation');
            if(isAnswered) {
                expDiv.innerHTML = `<strong>Pembahasan:</strong><br>${q.exp}`;
                expDiv.style.display = 'block';
            } else {
                expDiv.style.display = 'none';
            }

            document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
            
            // Tombol Next berubah jadi Selesai di akhir
            const btnNext = document.getElementById('btn-next');
            if (currentQuestionIndex === currentQuestions.length - 1) {
                btnNext.textContent = "Selesai Kuis";
                btnNext.style.backgroundColor = "#e91e63";
            } else {
                btnNext.textContent = "Soal Selanjutnya";
                btnNext.style.backgroundColor = "#2196F3";
            }
        }

        function selectAnswer(selectedOpt, btnElement) {
            // 1. SISTEM FLAGGING: Tolak interaksi lanjutan jika memori mendeteksi sudah dijawab (Cegah Spam Klik)
            if (userAnswers[currentQuestionIndex] !== null) return;

            const q = currentQuestions[currentQuestionIndex];
            
            // Simpan jawaban siswa ke dalam bentuk objek
            userAnswers[currentQuestionIndex] = {
                text: selectedOpt.text,
                isCorrect: selectedOpt.isCorrect
            };
            
            // Kunci semua tombol secara visual
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.classList.add('disabled'));

            if (selectedOpt.isCorrect) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('wrong');
                // Cari jawaban benar untuk dihijaukan
                buttons.forEach((btn, idx) => {
                    if(q.shuffledOpts[idx].isCorrect) btn.classList.add('correct');
                });
            }

            // Panggil fungsi pembaruan skor aman
            updateScoreDisplay();
            
            const expDiv = document.getElementById('explanation');
            expDiv.innerHTML = `<strong>Pembahasan:</strong><br>${q.exp}`;
            expDiv.style.display = 'block';
        }

        // Fungsi baru untuk Kalkulasi Aman
        function updateScoreDisplay() {
            // 4. PERHITUNGAN BERBASIS PERSENTASE
            const jumlahBenar = userAnswers.filter(ans => ans !== null && ans.isCorrect).length;
            const skorHitung = (jumlahBenar / currentQuestions.length) * 100;
            
            // 2. LIMITER: Skor maksimal tidak bisa tembus 100
            score = Math.min(Math.round(skorHitung), 100);
            
            document.getElementById('score-board').textContent = `Skor Sementara: ${score}`;
        }

        function nextQuestion() {
            if (userAnswers[currentQuestionIndex] === null) {
                alert("Silakan pilih jawaban terlebih dahulu!");
                return;
            }

            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function finishQuiz() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('main-header').textContent = `Kode Soal: PNC-STS-K3-S2-HOTS | Hasil Akhir`;
            
            const finalScore = Math.round(score);
            document.getElementById('final-score').textContent = finalScore;
            
            let message = "";
            if(finalScore >= 80) message = "Luar Biasa! Kamu sangat memahami makna keberagaman.";
            else if(finalScore >= 60) message = "Bagus! Terus pelajari tentang kekayaan budaya kita.";
            else message = "Tetap semangat! Mari belajar lagi tentang indahnya perbedaan.";
            document.getElementById('result-message').textContent = message;

            // Simpan ke riwayat
            const date = new Date();
            const waktu = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
            
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            history.unshift({
                nama: currentUser.nama,
                kelas: currentUser.kelas,
                waktu: waktu,
                skor: finalScore
            });

            // Batasi penyimpanan (misal 50 terbaru)
            if (history.length > 50) history.pop();

            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }
    </script>
